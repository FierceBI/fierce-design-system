<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fierce Learning Series — Email Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-start: #f5a623;
            --gradient-mid: #eb7525;
            --gradient-end: #d45f10;
            --color-text: #0e0e0e;
            --font-serif: 'DM Serif Display', serif;
            --font-sans: 'DM Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            font-family: var(--font-sans);
            background: #ffffff;
            padding: 0;
            margin: 0;
            width: 650px;
            height: 280px;
            overflow: hidden;
        }

        .banner {
            width: 650px;
            height: 280px;
            position: relative;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        /* Background Image */
        .banner-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Dark Overlay with Diagonal */
        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(105deg,
                rgba(14, 14, 14, 0.97) 0%,
                rgba(14, 14, 14, 0.95) 50%,
                rgba(14, 14, 14, 0.7) 65%,
                rgba(14, 14, 14, 0.3) 80%,
                transparent 100%
            );
        }

        /* Gradient accent line on diagonal */
        .banner-accent-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 58%;
            width: 3px;
            background: linear-gradient(180deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            transform: skewX(-15deg);
            opacity: 0.5;
        }

        /* Content */
        .banner-content {
            position: relative;
            z-index: 2;
            padding: 40px 45px;
            max-width: 60%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .banner-eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gradient-mid);
            margin-bottom: 12px;
        }

        .banner-title {
            font-family: var(--font-serif);
            font-size: 42px;
            font-weight: 400;
            line-height: 1.1;
            color: white;
            margin-bottom: 16px;
        }

        .banner-title .gradient {
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .banner-subtitle {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.75);
            max-width: 340px;
        }

        /* Fierce Logo */
        .banner-logo {
            position: absolute;
            bottom: 20px;
            right: 25px;
            z-index: 2;
            text-align: right;
        }

        .banner-logo .logo-text {
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 18px;
            color: white;
            letter-spacing: -0.02em;
        }

        .banner-logo .logo-sub {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div class="banner">
        <!-- Background Image -->
        <img src="learning-series-bg.jpg" alt="" class="banner-image">

        <!-- Dark Overlay -->
        <div class="banner-overlay"></div>

        <!-- Content -->
        <div class="banner-content">
            <div class="banner-eyebrow">Fierce Learning Series</div>
            <h1 class="banner-title"><span class="gradient">You're In!</span></h1>
            <p class="banner-subtitle">Our 30-minute sessions give you a chance to experience Fierce, meet a master facilitator, and ask real questions.</p>
        </div>

    </div>

</body>
</html>
